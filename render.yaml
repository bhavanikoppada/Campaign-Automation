services:
  - type: web
    name: campaign-orchestrator
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: N8N_WEBHOOK_URL
        value: https://academyss.app.n8n.cloud/webhook/campaign-trigger-v2
      - key: N8N_WEBHOOK_TEST_URL
        value: https://academyss.app.n8n.cloud/webhook-test/campaign-trigger-v2
      - key: N8N_SCHEDULED_WEBHOOK_URL
        value: https://academyss.app.n8n.cloud/webhook/scheduled-campaign-v1
      - key: N8N_SCHEDULED_WEBHOOK_TEST_URL
        value: https://academyss.app.n8n.cloud/webhook-test/scheduled-campaign-v1
      - key: N8N_WORKFLOW_ID
        value: a0ltWWzgYCReK63w
      - key: GOOGLE_SHEET_ID
        value: 166dxm8lGoJu2L83JfYc11G5Y8cZZZeMMbSHpsUyV1kI
      - key: CAMPAIGN_ID
        value: scheduled-campaign
      - key: SCHEDULER_ENABLED
        value: true
      - key: SCHEDULER_POLL_MS
        value: 60000
      - key: SCHEDULER_TIMEZONE
        value: Asia/Kolkata
      - key: REQUIRE_APPROVED
        value: true
      - key: DONE_STATUS
        value: Done
      - key: TRIGGERED_STATUS
        value: Triggered
      # Set in Render dashboard (secret):
      # - GOOGLE_SERVICE_ACCOUNT_JSON
