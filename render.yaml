services:
  - type: web
    name: campaign-orchestrator
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SHEET_ID
        value: 166dxm8lGoJu2L83JfYc11G5Y8cZZZeMMbSHpsUyV1kI
      - key: SHEET_NAME
        value: Sheet1
      - key: N8N_WEBHOOK
        value: https://academyss.app.n8n.cloud/webhook/scheduled-campaign-v1
      - key: POLL_MS
        value: 60000
      # Set in Render dashboard (secret):
      # - GOOGLE_SERVICE_ACCOUNT_JSON
