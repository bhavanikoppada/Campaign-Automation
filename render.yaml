services:
  - type: web
    name: campaign-orchestrator
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: N8N_WEBHOOK_URL
        value: https://academyss.app.n8n.cloud/webhook/campaign-trigger
      - key: GOOGLE_SHEET_ID
        value: 166dxm8lGoJu2L83JfYc11G5Y8cZZZeMMbSHpsUyV1kI
      - key: CAMPAIGN_ID
        value: scheduled-campaign
      # Add in N8N HTTP Request callback node:
      # - key: ORCHESTRATOR_URL
      #   value: https://campaign-orchestrator.onrender.com
